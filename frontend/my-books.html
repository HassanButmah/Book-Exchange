<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتبي - تبادل الكتب</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Floating Chatbot Button -->
<div class="chatbot-bubble" onclick="toggleChatbot()">
    🤖
</div>

<!-- Chat Window -->
<div class="chatbot-box hidden" id="chatbotBox">
    <div class="chatbot-header">
        <span>Live Assistant</span>
        <button onclick="toggleChatbot()">✖</button>
    </div>

    <div class="chatbot-messages" id="chatbotMessages">
        <div class="bot-msg">👋 اسألني عن أي كتاب موجود في النظام</div>
    </div>

    <div class="chatbot-input">
        <input type="text" id="chatbotInput" placeholder="اكتب سؤالك...">
        <button onclick="sendChatbotMessage()">إرسال</button>
    </div>
</div>
<body>
    <!-- Navbar injected by navbar.js -->

    <div class="page-container">
        <div class="page-header">
            <h1>📚 كتبي</h1>
            <p>إدارة الكتب التي أضفتها للتبادل</p>
        </div>

        <div id="myBooksGrid" class="books-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل كتبك...</p>
            </div>
        </div>
    </div>

    <!-- إشعارات الرسائل -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="navbar.js"></script>
    <script src="app.js"></script>
</body>
</html>
