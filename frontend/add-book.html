<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كتاب - تبادل الكتب</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar injected by navbar.js -->

    <div class="page-container">
        <div class="page-header">
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                إضافة كتاب للتبادل
            </h1>
            <p>أدرج كتابك الجامعي للتبادل مع الطلاب الآخرين</p>
        </div>

        <div class="form-container">
            <form id="addBookForm" class="book-form">
                <div class="form-group">
                    <label for="title">عنوان الكتاب *</label>
                    <input type="text" id="title" name="title" placeholder="أدخل عنوان الكتاب" required>
                </div>

                <div class="form-group">
                    <label for="description">الوصف *</label>
                    <textarea id="description" name="description" placeholder="صف حالة الكتاب والتفاصيل" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label for="condition">الحالة *</label>
                    <select id="condition" name="condition" required>
                        <option value="">اختر الحالة</option>
                        <option value="New">جديد</option>
                        <option value="Used">مستعمل</option>
                    </select>
                </div>

                <!-- Multi-image upload -->
                <div class="form-group">
                    <label>صور الكتاب (اختياري — حتى 5 صور)</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <input type="file" id="bookImages" name="images" accept="image/*" multiple>
                        <div class="upload-placeholder" onclick="document.getElementById('bookImages').click()">
                            <span class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#11753b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            </span>
                            <p>اضغط لاختيار صور من جهازك</p>
                            <small>JPG, PNG, WEBP — حتى 5MB لكل صورة — حتى 5 صور</small>
                        </div>
                    </div>

                    <!-- Preview grid -->
                    <div id="imagePreviewGrid" class="image-preview-grid hidden"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBookBtn">إضافة الكتاب</button>
                    <a href="my-books.html" class="btn btn-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>

    <!-- إشعارات الرسائل -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="navbar.js"></script>
    <script src="app.js"></script>
</body>
</html>
