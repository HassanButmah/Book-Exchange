<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير - تبادل الكتب</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        /* ── Admin Panel Overrides ── */
        .admin-shell { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

        /* Stat cards */
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .a-stat {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(27,94,32,.1);
            border: 1px solid #E8E8E8;
        }
        .a-stat-num {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg,#1B5E20,#0B5F1B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .a-stat-num.green  { background: linear-gradient(135deg,#1B5E20,#0B5F1B); -webkit-background-clip:text; background-clip:text; }
        .a-stat-num.orange { background: linear-gradient(135deg,#11753b,#11753b); -webkit-background-clip:text; background-clip:text; }
        .a-stat-num.red    { background: linear-gradient(135deg,#ef476f,#c0392b); -webkit-background-clip:text; background-clip:text; }
        .a-stat-num.blue   { background: linear-gradient(135deg,#1B5E20,#0B5F1B);  -webkit-background-clip:text; background-clip:text; }
        .a-stat-label { font-size: .85rem; color: #718096; margin-top: 6px; font-weight: 600; }

        /* Tabs */
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #E8E8E8; padding-bottom: 0; }
        .admin-tab {
            padding: 10px 24px; border: none; background: none; font-family: inherit;
            font-size: 1rem; font-weight: 700; color: #718096; cursor: pointer;
            border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s;
        }
        .admin-tab.active { color: #1B5E20; border-bottom-color: #1B5E20; }
        .admin-tab:hover  { color: #1B5E20; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Table */
        .a-table-wrap { overflow-x: auto; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
        .a-table { width: 100%; border-collapse: collapse; background: #fff; }
        .a-table th { background: linear-gradient(135deg,#1B5E20,#0B5F1B); color: #fff; padding: 14px 16px; font-size: .88rem; text-align: right; font-weight: 700; }
        .a-table th:first-child { border-radius: 0 14px 0 0; }
        .a-table th:last-child  { border-radius: 14px 0 0 0; }
        .a-table td { padding: 12px 16px; border-bottom: 1px solid #F5F5F5; font-size: .9rem; vertical-align: middle; }
        .a-table tr:last-child td { border-bottom: none; }
        .a-table tr:hover td { background: #FAFAFA; }

        /* Badges */
        .a-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:700; }
        .a-badge.available   { background:#d4f1ed; color:#1B5E20; }
        .a-badge.reserved    { background:#fef3cd; color:#FFD700; }
        .a-badge.unavailable { background:#fde8ef; color:#ef476f; }
        .a-badge.admin-role  { background:#d4f1ed; color:#1B5E20; }
        .a-badge.user-role   { background:#e0e7ff; color:#1B5E20; }
        .a-badge.verified    { background:#d4f1ed; color:#1B5E20; }
        .a-badge.unverified  { background:#fde8ef; color:#ef476f; }

        /* Action buttons */
        .a-btn { border:none; border-radius:8px; padding:6px 14px; font-size:.82rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
        .a-btn-danger  { background:#fde8ef; color:#ef476f; }
        .a-btn-danger:hover  { background:#ef476f; color:#fff; }
        .a-btn-warn    { background:#fef3cd; color:#FFD700; }
        .a-btn-warn:hover    { background:#FFD700; color:#1B5E20; }
        .a-btn-ok      { background:#d4f1ed; color:#1B5E20; }
        .a-btn-ok:hover      { background:#1B5E20; color:#fff; }
        .a-btn-purple  { background:#d4f1ed; color:#1B5E20; }
        .a-btn-purple:hover  { background:#1B5E20; color:#fff; }
        .a-actions { display:flex; gap:6px; flex-wrap:wrap; }

        /* Search bar */
        .a-search { width:100%; padding:10px 16px; border:2px solid #E8E8E8; border-radius:12px; font-size:.95rem; margin-bottom:16px; font-family:inherit; outline:none; transition: border .2s; }
        .a-search:focus { border-color:#1B5E20; }

        /* Confirm modal */
        .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .confirm-box { background:#fff; border-radius:20px; padding:32px; max-width:400px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .confirm-box h3 { margin-bottom:12px; font-size:1.2rem; }
        .confirm-box p  { color:#718096; margin-bottom:24px; }
        .confirm-btns   { display:flex; gap:12px; justify-content:center; }

        .page-header h1 { font-size: 1.8rem; }
    </style>
</head>
<body>
<!-- Navbar injected by navbar.js -->

<div class="page-container">
    <div class="page-header">
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            لوحة تحكم المدير
        </h1>
        <p>إدارة شاملة للمنصة — مستخدمون، كتب، إحصائيات</p>
    </div>

    <div class="admin-shell">

        <!-- ── STATS ── -->
        <div class="admin-stats-grid" id="statsGrid">
            <div class="a-stat"><div class="a-stat-num" id="sUsers">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> المستخدمون</div></div>
            <div class="a-stat"><div class="a-stat-num blue" id="sBooks">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> الكتب</div></div>
            <div class="a-stat"><div class="a-stat-num green" id="sAvail">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#11753b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> متاحة</div></div>
            <div class="a-stat"><div class="a-stat-num orange" id="sReserved">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> محجوزة</div></div>
            <div class="a-stat"><div class="a-stat-num red" id="sHidden">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> مخفية</div></div>
            <div class="a-stat"><div class="a-stat-num" id="sMessages">—</div><div class="a-stat-label"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> الرسائل</div></div>
        </div>
        <div style="text-align:left;margin-top:-8px;margin-bottom:8px;">
            <button onclick="refreshStats()" style="background:none;border:1px solid #1B5E20;color:#1B5E20;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:0.82rem;font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:6px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                تحديث
            </button>
        </div>

        <!-- ── TABS ── -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('books')">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                الكتب
            </button>
            <button class="admin-tab" onclick="switchTab('users')">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                المستخدمون
            </button>
        </div>

        <!-- ── BOOKS TAB ── -->
        <div class="tab-panel active" id="tab-books">
            <input class="a-search" id="bookSearch" placeholder="ابحث بعنوان الكتاب أو اسم المالك..." oninput="filterBooks()">
            <div class="a-table-wrap">
                <table class="a-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الكتاب</th>
                            <th>المالك</th>
                            <th>الحالة</th>
                            <th>الظهور</th>
                            <th>آخر تحديث</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="booksBody">
                        <tr><td colspan="7" style="text-align:center;padding:30px;color:#718096;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ── USERS TAB ── -->
        <div class="tab-panel" id="tab-users">
            <input class="a-search" id="userSearch" placeholder="ابحث بالاسم أو الإيميل..." oninput="filterUsers()">
            <div class="a-table-wrap">
                <table class="a-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الاسم</th>
                            <th>الإيميل</th>
                            <th>الدور</th>
                            <th>التحقق</th>
                            <th>الكتب</th>
                            <th>تاريخ التسجيل</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="8" style="text-align:center;padding:30px;color:#718096;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /admin-shell -->
</div><!-- /page-container -->

<!-- ── CONFIRM DIALOG ── -->
<div id="confirmOverlay" class="confirm-overlay" style="display:none;">
    <div class="confirm-box">
        <h3 id="confirmTitle">تأكيد الإجراء</h3>
        <p id="confirmMsg"></p>
        <div class="confirm-btns">
            <button id="confirmYes" class="a-btn a-btn-danger">تأكيد</button>
            <button onclick="closeConfirm()" class="a-btn a-btn-purple">إلغاء</button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="navbar.js?v=3"></script>
<script src="app.js?v=3"></script>
<script>
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const API = IS_LOCAL ? 'http://localhost:5000/api' : '/api';
let allBooks = [], allUsers = [];

function token() { return localStorage.getItem('token'); }

/* ── TABS ── */
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}

/* ── STATS ── */
async function loadStats() {
    try {
        const res = await fetch(`${API}/admin/stats`, { headers: { Authorization: `Bearer ${token()}` } });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            showToast(`خطأ في تحميل الإحصائيات: ${err.error || res.status}`, 'error');
            return;
        }
        const d = await res.json();
        document.getElementById('sUsers').textContent    = d.totalUsers    ?? '0';
        document.getElementById('sBooks').textContent    = d.totalBooks    ?? '0';
        document.getElementById('sAvail').textContent    = d.available     ?? '0';
        document.getElementById('sReserved').textContent = d.reserved      ?? '0';
        document.getElementById('sHidden').textContent   = d.unavailable   ?? '0';
        document.getElementById('sMessages').textContent = d.totalMessages ?? '0';
    } catch(e) {
        console.error('loadStats error:', e);
        showToast('تعذّر الاتصال بالخادم', 'error');
    }
}

/* ── BOOKS ── */
async function loadBooks() {
    try {
        const res = await fetch(`${API}/admin/books`, { headers: { Authorization: `Bearer ${token()}` } });
        if (!res.ok) { showToast(`خطأ تحميل الكتب: ${res.status}`, 'error'); return; }
        allBooks = await res.json();
        renderBooks(allBooks);
    } catch(e) { showToast('تعذّر تحميل الكتب', 'error'); return; }
    // Attach event listener for book actions
    const booksTbody = document.getElementById('booksBody');
    booksTbody.addEventListener('click', async (e) => {
        const button = e.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const id = parseInt(button.dataset.bookId, 10);
        if (isNaN(id)) return;

        if (action === 'change-status') {
            const status = button.dataset.status;
            await changeBookStatus(id, status);
        } else if (action === 'delete-book') {
            confirmAction('حذف الكتاب نهائياً؟', () => deleteBook(id));
        }
    });
}

function filterBooks() {
    const q = document.getElementById('bookSearch').value.toLowerCase();
    renderBooks(allBooks.filter(b =>
        b.title.toLowerCase().includes(q) || b.owner_name.toLowerCase().includes(q)
    ));
}

function renderBooks(books) {
    const tbody = document.getElementById('booksBody');
    if (!books.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:#718096;">لا توجد كتب</td></tr>`; return; }

    const statusMap = { available:'متاح', reserved:'محجوز', unavailable:'غير متوفر' };
    const statusCls = { available:'available', reserved:'reserved', unavailable:'unavailable' };

    tbody.innerHTML = books.map((b, i) => {
        return `
            <tr>
                <td style="color:#a0aec0;font-size:.82rem;">${i+1}</td>
                <td><strong>${escH(b.title)}</strong><br><small style="color:#a0aec0">${escH(b.description?.substring(0,40) || '')}...</small></td>
                <td>${escH(b.owner_name)}<br><small style="color:#a0aec0"><bdo dir="ltr">${escH(b.owner_email||'')}</bdo></small></td>
                <td><span class="a-badge ${statusCls[b.status]||'available'}">${statusMap[b.status]||'متاح'}</span></td>
                <td>${b.is_visible ? '🟢 ظاهر' : '🔴 مخفي'}</td>
                <td style="font-size:.8rem;color:#718096;">${new Date(b.updated_at).toLocaleDateString('ar-SA')}</td>
                <td>
                    <div class="a-actions">
                        ${b.status !== 'available'   ? `<button class="a-btn a-btn-ok"      data-action="change-status" data-book-id="${escH(b.id)}" data-status="available">✅ إتاحة</button>` : ''}
                        ${b.status !== 'reserved'    ? `<button class="a-btn a-btn-warn"    data-action="change-status" data-book-id="${escH(b.id)}" data-status="reserved">🔒 حجز</button>` : ''}
                        ${b.status !== 'unavailable' ? `<button class="a-btn a-btn-purple"  data-action="change-status" data-book-id="${escH(b.id)}" data-status="unavailable">🚫 إخفاء</button>` : ''}
                        <button class="a-btn a-btn-danger" data-action="delete-book" data-book-id="${escH(b.id)}">🗑️ حذف</button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

async function changeBookStatus(id, status) {
    await fetch(`${API}/admin/books/${id}/status`, {
        method:'PUT', headers:{ Authorization:`Bearer ${token()}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ status })
    });
    showToast('تم تغيير الحالة','success');
    loadBooks(); loadStats();
}

async function deleteBook(id) {
    await fetch(`${API}/admin/books/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token()}` } });
    showToast('تم حذف الكتاب','success');
    loadBooks(); loadStats(); closeConfirm();
}

/* ── USERS ── */
async function loadUsers() {
    try {
        const res = await fetch(`${API}/admin/users`, { headers: { Authorization: `Bearer ${token()}` } });
        if (!res.ok) { showToast(`خطأ تحميل المستخدمين: ${res.status}`, 'error'); return; }
        allUsers = await res.json();
        renderUsers(allUsers);
    } catch(e) { showToast('تعذّر تحميل المستخدمين', 'error'); return; }
    // Attach event listener for user actions
    const usersTbody = document.getElementById('usersBody');
    usersTbody.addEventListener('click', async (e) => {
        const button = e.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const id = parseInt(button.dataset.userId, 10);
        if (isNaN(id)) return;

        if (action === 'toggle-verify') {
            await toggleVerify(id);
        } else if (action === 'delete-user') {
            const user = allUsers.find(u => u.id === id);
            const userName = user ? user.name : 'المستخدم';
            confirmAction(`حذف المستخدم ${userName} وجميع بياناته؟`, () => deleteUser(id));
        }
    });
}

function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    renderUsers(allUsers.filter(u =>
        u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
    ));
}

function renderUsers(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:24px;color:#718096;">لا يوجد مستخدمون</td></tr>`; return; }

    tbody.innerHTML = users.map((u, i) => {
        return `
            <tr>
                <td style="color:#a0aec0;font-size:.82rem;">${i+1}</td>
                <td><strong>${escH(u.name)}</strong></td>
                <td><bdo dir="ltr" style="font-size:.85rem;">${escH(u.email)}</bdo></td>
                <td><span class="a-badge ${u.role === 'admin' ? 'admin-role':'user-role'}">${u.role === 'admin' ? '🛡️ مدير':'👤 مستخدم'}</span></td>
                <td><span class="a-badge ${u.is_verified ? 'verified':'unverified'}">${u.is_verified ? '✅ مفعّل':'❌ غير مفعّل'}</span></td>
                <td style="text-align:center;font-weight:700;">${u.book_count}</td>
                <td style="font-size:.8rem;color:#718096;">${new Date(u.created_at).toLocaleDateString('ar-SA')}</td>
                <td>
                    <div class="a-actions">
                        <button class="a-btn ${u.is_verified ? 'a-btn-warn':'a-btn-ok'}" data-action="toggle-verify" data-user-id="${escH(u.id)}" data-is-verified="${escH(u.is_verified)}">
                            ${u.is_verified ? '🔒 تعطيل':'✅ تفعيل'}
                        </button>
                        ${u.role !== 'admin' ? `<button class="a-btn a-btn-danger" data-action="delete-user" data-user-id="${escH(u.id)}">🗑️ حذف</button>` : ''}
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

async function toggleVerify(id) {
    const res  = await fetch(`${API}/admin/users/${id}/verify`, { method:'PATCH', headers:{ Authorization:`Bearer ${token()}` } });
    const data = await res.json();
    showToast(data.message, 'success');
    loadUsers(); loadStats();
}

async function deleteUser(id) {
    const res = await fetch(`${API}/admin/users/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token()}` } });
    const data = await res.json();
    showToast(data.message || 'تم الحذف', 'success');
    loadUsers(); loadStats(); closeConfirm();
}

/* ── CONFIRM DIALOG ── */
function confirmAction(msg, cb) {
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').style.display = 'flex';
    document.getElementById('confirmYes').onclick = cb;
}
function closeConfirm() {
    document.getElementById('confirmOverlay').style.display = 'none';
}

/* ── UTIL ── */
function escH(t) {
    if (!t) return '';
    return String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

/* ── INIT ── */
async function refreshStats() {
    const tok = localStorage.getItem('token');
    if (!tok) { location.href = 'login.html'; return; }
    try {
        const res = await fetch(`${API}/admin/stats`, { headers: { Authorization: `Bearer ${tok}` } });
        if (res.status === 401) { location.href = 'login.html'; return; }
        if (res.status === 403) { location.href = 'marketplace.html'; return; }
        if (!res.ok) {
            document.getElementById('sUsers').textContent = 'ERR';
            return;
        }
        const d = await res.json();
        document.getElementById('sUsers').textContent    = d.totalUsers    ?? 0;
        document.getElementById('sBooks').textContent    = d.totalBooks    ?? 0;
        document.getElementById('sAvail').textContent    = d.available     ?? 0;
        document.getElementById('sReserved').textContent = d.reserved      ?? 0;
        document.getElementById('sHidden').textContent   = d.unavailable   ?? 0;
        document.getElementById('sMessages').textContent = d.totalMessages ?? 0;
    } catch(e) {
        document.getElementById('sUsers').textContent = '!';
        console.error('refreshStats error:', e);
    }
}

window.addEventListener('DOMContentLoaded', async () => {
    const tok = localStorage.getItem('token');
    if (!tok) { location.href = 'login.html'; return; }

    await refreshStats();
    await Promise.all([loadBooks(), loadUsers()]);
});
</script>
